<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Клиенты — ADMIN CORE</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="admin-root">
    <aside class="admin-sidebar">
      <div class="admin-brand">ADMIN CORE</div>
      <nav class="admin-nav">
        <button class="nav-button" onclick="window.location.href='admin.html'">Главная</button>
        <button class="nav-button" onclick="window.location.href='admin-orders.html'">Заказы</button>
        <button class="nav-button active">Клиенты</button>
        <button class="nav-button" onclick="window.location.href='admin-support.html'">Поддержка</button>
        <button class="nav-button" onclick="window.location.href='admin-warehouse.html'">Склад</button>
        <button class="nav-button" onclick="window.location.href='admin-settings.html'">Настройки UI</button>
      </nav>
      <div class="admin-status-card">
        <div class="server-status-title">СТАТУС СЕРВЕРА</div>
        <div class="server-status-line">
          <span class="status-dot online"></span>
          <span class="status-label">ONLINE</span>
        </div>
      </div>
      <button class="nav-button logout-btn" onclick="adminLogout()">Выйти</button>
    </aside>

    <main class="admin-main">
      <header class="admin-header">
        <div class="admin-search">
          <span class="search-icon">🔍</span>
          <input id="search-input" type="text" placeholder="Поиск клиентов по имени, телефону..." aria-label="Поиск" />
        </div>
        <div class="admin-usercard">
          <div class="user-avatar">А</div>
          <div class="user-info">
            <strong id="admin-name">Иван Админов</strong>
            <span>SUPER ADMIN</span>
          </div>
        </div>
      </header>

      <section class="admin-screen">
        <div class="clients-page-header">
          <h1>Клиентская база</h1>
          <p>Управление клиентами, их заказы и история</p>
          <div class="clients-page-actions">
            <button id="refresh-clients-btn" class="btn-secondary">Обновить</button>
            <button id="export-clients-btn" class="btn-secondary">Экспорт CSV</button>
            <button id="new-client-btn" class="btn-primary">+ Новый клиент</button>
          </div>
        </div>

        <div class="clients-filters">
          <input type="text" id="filter-name" placeholder="Фильтр по имени" class="filter-input" />
          <input type="text" id="filter-phone" placeholder="Фильтр по телефону" class="filter-input" />
          <select id="filter-status-clients" class="filter-select">
            <option value="">Все статусы</option>
            <option value="ACTIVE">Активные</option>
            <option value="INACTIVE">Неактивные</option>
          </select>
        </div>

        <div id="clients-container" class="clients-table-container">
          <table class="clients-table">
            <thead>
              <tr>
                <th>Клиент</th>
                <th>Email</th>
                <th>Телефон</th>
                <th>Заказов</th>
                <th>Оборот</th>
                <th>Дата регистрации</th>
                <th>Статус</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody id="clients-body">
              <tr>
                <td colspan="8" class="empty-state">Загрузка клиентов...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="scripts/admin-clients.js" defer></script>
</body>
</html>
