<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADMIN CORE — Панель администратора</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="admin-root">
    <aside class="admin-sidebar">
      <div class="admin-brand">ADMIN CORE</div>
      <nav class="admin-nav">
        <button class="nav-button active" onclick="loadScreen('dashboard')">Главная</button>
        <button class="nav-button" onclick="window.location.href='admin-orders.html'">Заказы</button>
        <button class="nav-button" onclick="window.location.href='admin-clients.html'">Клиенты</button>
        <button class="nav-button" onclick="window.location.href='admin-support.html'">Поддержка</button>
        <button class="nav-button" onclick="window.location.href='admin-warehouse.html'">Склад</button>
        <button class="nav-button" onclick="window.location.href='admin-settings.html'">Настройки UI</button>
      </nav>
      <div class="admin-status-card">
        <div class="server-status-title">СТАТУС СЕРВЕРА</div>
        <div class="server-status-line">
          <span class="status-dot online"></span>
          <span class="status-label">ONLINE</span>
        </div>
      </div>
      <button class="nav-button logout-btn" onclick="adminLogout()">Выйти</button>
    </aside>

    <main class="admin-main">
      <header class="admin-header">
        <div class="admin-search">
          <span class="search-icon">🔍</span>
          <input id="search-input" type="text" placeholder="Поиск по заказам, клиентам..." aria-label="Поиск" />
        </div>
        <div class="admin-usercard">
          <div class="user-avatar">А</div>
          <div class="user-info">
            <strong>Иван Админов</strong>
            <span>SUPER ADMIN</span>
          </div>
        </div>
      </header>

      <section id="login-screen" class="admin-screen admin-login-screen">
        <div class="admin-login-card">
          <h1>Вход в админ-панель</h1>
          <p>Используйте телефон <strong>123456</strong> и имя <strong>admin123</strong>.</p>
          <form id="admin-login-form" class="admin-login-form">
            <label>
              Телефон
              <input name="phone" type="text" placeholder="123456" autocomplete="off" required />
            </label>
            <label>
              Имя администратора
              <input name="name" type="text" placeholder="admin123" autocomplete="off" required />
            </label>
            <button type="submit" class="btn-primary">Войти</button>
            <div id="login-message" class="login-message" aria-live="polite"></div>
          </form>
        </div>
      </section>

      <section id="dashboard-screen" class="admin-screen admin-dashboard-screen hidden">
        <div class="dashboard-header">
          <div>
            <h1>Панель администратора</h1>
            <p>Здесь отображается статистика регистрации и заказов.</p>
          </div>
          <div class="dashboard-actions">
            <button id="refresh-button" class="btn-secondary">Обновить</button>
            <button id="logout-button" class="admin-logout-button">Выйти</button>
          </div>
        </div>

        <div class="stat-card-row">
          <article class="stat-card">
            <span class="stat-title">Всего заказов</span>
            <strong id="total-orders">0</strong>
          </article>
          <article class="stat-card">
            <span class="stat-title">Зарегистрированных пользователей</span>
            <strong id="total-users">0</strong>
          </article>
          <article class="stat-card">
            <span class="stat-title">Последнее обновление</span>
            <strong id="last-updated">—</strong>
          </article>
        </div>

        <div class="orders-panel">
          <div class="orders-panel-header">
            <h2>Последние заказы</h2>
            <button id="create-order-button" class="btn-secondary">Добавить тестовый заказ</button>
          </div>
          <div id="orders-list" class="orders-list"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="scripts/admin.js" defer></script>
</body>
</html>
