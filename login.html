<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3Д печать</title>
    <link rel="stylesheet" href="./site.css" />
  </head>
  <body>
    <div class="login-wrap">
      <section class="login-left" aria-label="Форма входа">
        <div class="login-breadcrumb-row">
          <div class="breadcrumb"><span class="arrow"><img class="arrow-icon" src="image/Frame_1_748.png" alt="exit"></span><a href="landing.html">Главная</a></div>
        </div>
        <h1 style="color: var(--accent);">Добро пожаловать!</h1>
        <div class="sub">Мы рады видеть тебя</div>

        <form id="auth-form" class="login-form" data-auth-mode="login">
          <div id="register-extra-fields" style="display:none;">
            <label class="field">
              <span class="label">Фамилия</span>
              <input class="input" type="text" name="lastName" placeholder="Введите фамилию" />
            </label>
            <label class="field" style="margin-top: 10px;">
              <span class="label">Имя</span>
              <input class="input" type="text" name="firstName" placeholder="Введите имя" />
            </label>
            <label class="field" style="margin-top: 10px;">
              <span class="label">Отчество</span>
              <input class="input" type="text" name="middleName" placeholder="Введите отчество" />
            </label>
            <label class="field" style="margin-top: 10px;">
              <span class="label">Почта</span>
              <input class="input" type="email" name="email" inputmode="email" autocomplete="email" placeholder="name@email.com" />
            </label>
          </div>
          <label class="field">
            <span class="label">Номер телефона</span>
            <input class="input" type="tel" name="phone" inputmode="numeric" autocomplete="tel" maxlength="16" placeholder="+79991234567" required />
          </label>
          <label class="field">
            <span class="label">Пароль</span>
            <div class="password-peek">
              <input class="input password-peek__input" type="password" name="password" placeholder="Введите пароль" minlength="6" required />
              <button class="password-peek__btn" id="password-peek-btn" type="button" aria-label="Показать пароль">
                <img src="image/Frame_1_273.png" alt="Показать пароль" />
              </button>
            </div>
          </label>
          <label class="login-consent">
            <input type="checkbox" id="policy-consent" />
            <span>
              Я соглашаюсь с
              <a href="https://pd.rkn.gov.ru/" target="_blank" rel="noopener noreferrer">политикой обработки персональных данных</a>
            </span>
          </label>

          <button class="btn btn-primary" type="submit" style="padding:10px 16px; border-radius:12px; width:100%;">
            Войти
          </button>
          <button id="register-btn" class="btn btn-ghost" type="button" style="margin-top:2px;">
            Создать аккаунт
          </button>
          <button id="back-to-login-btn" class="btn btn-ghost" type="button" style="margin-top:2px; display:none;">
            Назад ко входу
          </button>

          <div id="auth-status" class="login-note" aria-live="polite"></div>
        </form>
      </section>

      <section class="login-right" aria-hidden="true">
        <div class="brand">3Д Печать</div>
      </section>
    </div>

    <script src="./scripts/login.js"></script>
  </body>
</html>
